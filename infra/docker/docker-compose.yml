services:
  postgres:
    image: postgres:16-alpine
    container_name: mdchat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mdchat_synapse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: mdchat_synapse
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdchat_synapse"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdchat-internal

  redis:
    image: redis:7.2-alpine
    container_name: mdchat-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdchat-internal

  neo4j:
    image: neo4j:5.20-community
    container_name: mdchat-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?required}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    ports:
      - "127.0.0.1:7474:7474"
    networks:
      - mdchat-internal

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: mdchat-synapse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: ${SYNAPSE_SERVER_NAME:-msg.md-chat.eu}
      SYNAPSE_REPORT_STATS: "no"
      UID: 991
      GID: 991
    volumes:
      - synapse-data:/data
      - ../synapse/homeserver.yaml:/data/homeserver.yaml:ro
    ports:
      - "127.0.0.1:8008:8008"
      - "8448:8448"
    networks:
      - mdchat-internal
      - mdchat-public

  ai-layer:
    build:
      context: ../../ai-layer
      dockerfile: Dockerfile
    container_name: mdchat-ai
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_started
    environment:
      AI_LAYER_PORT: 5002
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      ROUTER_API_BASE: ${ROUTER_API_BASE:-https://api.megapromoting.com/v1}
      ROUTER_API_KEY: ${ROUTER_API_KEY:?required}
      SYNAPSE_HS_URL: http://synapse:8008
      INFOBIP_BASE_URL: ${INFOBIP_BASE_URL:-https://api.infobip.com}
      INFOBIP_API_KEY: ${INFOBIP_API_KEY:?required}
      INFOBIP_SENDER_ID: ${INFOBIP_SENDER_ID:-MDChat}
    ports:
      - "127.0.0.1:5002:5002"
    networks:
      - mdchat-internal

  nginx:
    image: nginx:1.27-alpine
    container_name: mdchat-nginx
    restart: unless-stopped
    depends_on:
      - synapse
      - ai-layer
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
      - ../landing:/var/www/md-chat-landing:ro
      - nginx-certs:/etc/letsencrypt
      - nginx-acme:/var/www/acme-challenge
    ports:
      - "80:80"
      - "443:443"
    networks:
      - mdchat-public
      - mdchat-internal

  certbot:
    image: certbot/certbot:latest
    container_name: mdchat-certbot
    restart: "no"
    volumes:
      - nginx-certs:/etc/letsencrypt
      - nginx-acme:/var/www/acme-challenge
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"]

  prometheus:
    image: prom/prometheus:latest
    container_name: mdchat-prometheus
    restart: unless-stopped
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - mdchat-internal

networks:
  mdchat-internal:
    driver: bridge
  mdchat-public:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  synapse-data:
  nginx-certs:
  nginx-acme:
  prometheus-data:
