global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'synapse'
    metrics_path: /_synapse/metrics
    static_configs:
      - targets: ['synapse:8008']

  - job_name: 'ai-layer'
    static_configs:
      - targets: ['ai-layer:5002']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
