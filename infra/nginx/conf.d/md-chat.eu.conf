# MD-Chat — main nginx configuration.

# HTTP → HTTPS redirect + ACME challenge endpoint.
server {
    listen 80;
    listen [::]:80;
    server_name msg.md-chat.eu md-chat.eu www.md-chat.eu;

    location /.well-known/acme-challenge/ {
        root /var/www/acme-challenge;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# msg.md-chat.eu — Matrix client API + AI layer.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name msg.md-chat.eu;

    ssl_certificate /etc/letsencrypt/live/msg.md-chat.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msg.md-chat.eu/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/security-headers.conf;

    limit_req zone=api burst=20 nodelay;
    limit_conn conn_limit 50;

    client_max_body_size 50M;

    location ~ ^(/_matrix|/_synapse/client) {
        proxy_pass http://synapse:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }

    location /api/ai/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://ai-layer:5002/api/;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location = /.well-known/matrix/client {
        default_type application/json;
        return 200 '{"m.homeserver":{"base_url":"https://msg.md-chat.eu"}}';
        add_header Access-Control-Allow-Origin *;
    }

    location = /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server":"msg.md-chat.eu:8448"}';
        add_header Access-Control-Allow-Origin *;
    }
}

# Matrix federation port.
server {
    listen 8448 ssl http2;
    listen [::]:8448 ssl http2;
    server_name msg.md-chat.eu;

    ssl_certificate /etc/letsencrypt/live/msg.md-chat.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/msg.md-chat.eu/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;

    client_max_body_size 50M;

    location ~ ^(/_matrix|/_synapse/federation) {
        proxy_pass http://synapse:8008;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_read_timeout 600s;
    }
}

# md-chat.eu — landing page.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name md-chat.eu www.md-chat.eu;

    ssl_certificate /etc/letsencrypt/live/md-chat.eu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/md-chat.eu/privkey.pem;
    include /etc/nginx/snippets/ssl.conf;
    include /etc/nginx/snippets/security-headers.conf;

    root /var/www/md-chat-landing;
    index index.html;

    if ($host = www.md-chat.eu) {
        return 301 https://md-chat.eu$request_uri;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location = /security.txt {
        return 301 /.well-known/security.txt;
    }
}
