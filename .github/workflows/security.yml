name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 04:00 UTC — catches new CVEs in pinned deps.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-layer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[toml]>=1.7"

      - name: Run bandit
        run: |
          bandit -r src -ll -f txt -o bandit-report.txt || true
          bandit -r src -ll -f sarif -o bandit-report.sarif || true
          cat bandit-report.txt

      - name: Upload bandit SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ai-layer/bandit-report.sarif
        continue-on-error: true

      - name: Upload bandit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: ai-layer/bandit-report.*

  safety:
    name: Safety (CVE-known deps)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-layer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + safety
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "safety>=3.2"

      - name: Run safety check
        run: |
          safety check --full-report --output text > safety-report.txt || true
          cat safety-report.txt
        continue-on-error: true

      - name: Upload safety report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safety-report
          path: ai-layer/safety-report.txt

  pip-audit:
    name: pip-audit (PyPI advisory DB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-layer
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" "pip-audit>=2.7"

      - name: Run pip-audit
        run: |
          pip-audit --strict --desc -f json -o pip-audit.json || true
          pip-audit --strict --desc || true
        continue-on-error: true

      - name: Upload pip-audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: ai-layer/pip-audit.json

  trivy-dockerfile:
    name: Trivy (Dockerfile + image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan (Dockerfile)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: ai-layer/Dockerfile
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM
        continue-on-error: true

      - name: Build image for scanning
        run: |
          docker build -t md-chat-ai:scan ai-layer
        continue-on-error: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: md-chat-ai:scan
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config
        continue-on-error: true

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
        continue-on-error: true

      - name: Upload Trivy reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: trivy-*.sarif

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
