<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">MD-Chat app icon</title>
  <desc id="desc">Square app icon with Apple HIG 22.37 percent corner radius. Navy background with teal MC monogram.</desc>
  <!-- 22.37% of 1024 = 229 corner radius -->
  <rect x="0" y="0" width="1024" height="1024" rx="229" ry="229" fill="#1A2D4E"/>
  <!-- Inner circle accent for depth, very subtle -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#2DD4BF" stroke-opacity="0.12" stroke-width="6"/>
  <!-- Monogram scaled up (original 512 viewBox coords ×2, centered) -->
  <g fill="#2DD4BF" stroke="none" transform="translate(0,0) scale(2)">
    <path d="M 130 150 L 178 150 L 178 362 L 130 362 Z"/>
    <path d="M 246 150 L 294 150 L 294 362 L 246 362 Z"/>
    <path d="M 130 150 L 178 150 L 230 268 L 212 290 Z"/>
    <path d="M 294 150 L 246 150 L 194 268 L 212 290 Z"/>
    <path d="M 470 256
             A 102 102 0 1 0 368 358
             L 368 318
             A 62 62 0 1 1 430 256
             Z"/>
    <path d="M 368 358
             L 368 318
             A 62 62 0 0 0 410 296
             L 446 318
             A 102 102 0 0 1 368 358
             Z"/>
  </g>
</svg>
