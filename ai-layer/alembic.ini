; Alembic configuration for md-chat-ai.
;
; The DB URL is resolved at runtime from CONFIG.postgres_dsn (see
; migrations/env.py) so this file does not hard-code credentials.
; ``sqlalchemy.url`` is intentionally left empty.

[alembic]
script_location = migrations
prepend_sys_path = ./src
version_path_separator = os
sqlalchemy.url =

; Naming convention for autogen revisions — date-prefixed, all lowercase.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

timezone = UTC

[post_write_hooks]
; Run ruff/black on autogen files. Commented out by default because some
; CI runners don't have the formatters; enable locally.
; hooks = black,ruff
; black.type = console_scripts
; black.entrypoint = black
; black.options = -l 120
; ruff.type = console_scripts
; ruff.entrypoint = ruff
; ruff.options = check --fix

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
